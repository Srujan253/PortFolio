      .initial-loader {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; background-color: #030712; color: #22d3ee; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

      .initial-loader-spinner {

        border-radius: 50%; border-top-color: #22d3ee; animation: spin 1s ease-in-out infinite;
        margin-bottom: 24px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <div class="initial-loader">
      <div class="initial-loader-spinner"></div>
      <div style="font-weight: 600; letter-spacing: 3px; font-size: 14px; text-transform: uppercase;">Initializing System...</div>
